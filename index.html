<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبتي الخاصة</title>
    <style>
        :root { --bg: #0c0f12; --card: #1a1f26; --red: #e50914; --white: #fff; }
        body { background: var(--bg); color: var(--white); font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; border: 2px solid transparent; }
        .card:focus { border-color: var(--red); outline: none; }
        .admin { margin-top: 50px; background: #222; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: none; color: #fff; }
        button { background: var(--red); color: white; padding: 10px; border: none; cursor: pointer; width: 100%; }
        .hidden { display: none; }
        video { width: 100%; max-width: 800px; display: block; margin: 20px auto; }
    </style>
</head>
<body>

    <div id="home">
        <h1>مكتبتي الخاصة 🎬</h1>
        <div class="grid" id="library"></div>

        <div class="admin">
            <h3>أضف حلقة جديدة</h3>
            <input type="text" id="title" placeholder="اسم المسلسل">
            <input type="text" id="epName" placeholder="اسم الحلقة">
            <input type="text" id="url" placeholder="رابط الفيديو (الرابط المباشر للمقطع)">
            <button onclick="addVideo()">حفظ في المكتبة 💾</button>
        </div>
    </div>

    <div id="playerPage" class="hidden">
        <button onclick="goBack()">← العودة للرئيسية</button>
        <h2 id="viewTitle"></h2>
        <video id="vid" controls></video>
    </div>

    <script>
        let lib = JSON.parse(localStorage.getItem('my_lib')) || [];
        
        function render() {
            const list = document.getElementById('library');
            list.innerHTML = '';
            lib.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.tabIndex = 0;
                div.innerHTML = `<h3>${item.title}</h3><p>${item.epName}</p>`;
                div.onclick = () => play(item);
                list.appendChild(div);
            });
        }

        function addVideo() {
            const title = document.getElementById('title').value;
            const epName = document.getElementById('epName').value;
            const url = document.getElementById('url').value;
            if(!title || !url) return alert("الرجاء تعبئة البيانات");
            lib.push({title, epName, url});
            localStorage.setItem('my_lib', JSON.stringify(lib));
            render();
            alert("تم الحفظ!");
        }

        function play(item) {
            document.getElementById('home').classList.add('hidden');
            document.getElementById('playerPage').classList.remove('hidden');
            document.getElementById('viewTitle').innerText = item.epName;
            document.getElementById('vid').src = item.url;
        }

        function goBack() {
            document.getElementById('vid').pause();
            document.getElementById('playerPage').classList.add('hidden');
            document.getElementById('home').classList.remove('hidden');
        }

        render();
    </script>
</body>
</html>
