<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse | عالم الترفيه</title>
    <style>
        /* تصميم سينمائي عصري ومريح للعين والشاشات الكبيرة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(26, 26, 29, 0.6);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f2833;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3rem;
            color: #66fcf1;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        p {
            font-size: 1.2rem;
            color: #c5a059;
            margin-bottom: 40px;
        }

        .main-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #0b0c10;
            background-color: #66fcf1;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.4);
        }

        .main-btn:hover {
            background-color: #45a29e;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 252, 241, 0.6);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #45a29e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>StreamVerse</h1>
        <p>مرحباً بك في منصتك الترفيهية المخصصة للتلفزيون والشاشات الذكية</p>
        
        <!-- يمكنك تغيير هذا الزر ليوجهك لأي منصة أو مشغل تريده لاحقاً -->
        <a href="#" class="main-btn">ابدأ المشاهدة الآن</a>
    </div>

    <div class="footer">
        &copy; 2026 StreamVerse - جميع الحقوق محفوظة
    </div>

</body>
</html>
